<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#e8e8e8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Desk -->
  <rect x="70" y="370" width="660" height="25" rx="3" fill="#f0f0f0" stroke="#e0e0e0" stroke-width="1"/>
  <!-- Ultra-wide monitor -->
  <rect x="280" y="230" width="240" height="120" rx="8" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
  <rect x="286" y="236" width="228" height="78" rx="2" fill="#fafafa"/>
  <rect x="286" y="318" width="228" height="28" rx="2" fill="#f0f0f0"/>
  <!-- Monitor arm -->
  <rect x="395" y="348" width="10" height="22" fill="#d0d0d0"/>
  <!-- Base -->
  <rect x="310" y="390" width="180" height="40" rx="4" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="318" y="396" width="164" height="28" rx="3" fill="#fafafa"/>
  <!-- Magic Trackpad -->
  <rect x="505" y="400" width="50" height="30" rx="10" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
  <!-- Clean cable -->
  <line x1="280" y1="395" x2="280" y2="450" stroke="#d0d0d0" stroke-width="1" opacity="0.3"/>
  <!-- Cable management box -->
  <rect x="130" y="395" width="30" height="20" rx="4" fill="#ddd"/>
  <!-- Small lamp -->
  <rect x="190" y="310" width="5" height="60" rx="2" fill="#ccc"/>
  <ellipse cx="192" cy="306" rx="20" ry="5" fill="#ddd"/>
  <!-- Plant -->
  <circle cx="630" cy="375" r="16" fill="#7a8b5a"/>
  <line x1="630" y1="348" x2="630" y2="375" stroke="#6a7b4a" stroke-width="3"/>
  <circle cx="622" cy="353" r="7" fill="#8a9b6a"/>
  <circle cx="638" cy="351" r="6" fill="#8a9b6a"/>
  <!-- Text -->
  <rect x="260" y="480" width="280" height="2" fill="#ddd" opacity="0.6" rx="1"/>
  <text x="400" y="505" text-anchor="middle" fill="#bbb" font-family="sans-serif" font-size="13" letter-spacing="2">WIRELESS CLEAN SETUP</text>
</svg>
