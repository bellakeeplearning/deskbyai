<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect x="80" y="360" width="640" height="28" rx="4" fill="#0f3460"/>
  <!-- Glow line -->
  <rect x="80" y="358" width="640" height="3" fill="#e94560" opacity="0.6"/>
  <!-- Monitor with RGB glow -->
  <rect x="300" y="200" width="200" height="130" rx="8" fill="#222" stroke="#e94560" stroke-width="1" opacity="0.8"/>
  <rect x="306" y="206" width="188" height="80" rx="2" fill="#0a0a1a"/>
  <rect x="306" y="290" width="188" height="35" rx="2" fill="#1a1a2e"/>
  <!-- Monitor arm -->
  <rect x="395" y="328" width="10" height="32" fill="#444"/>
  <!-- Keyboard RGB -->
  <rect x="310" y="400" width="180" height="45" rx="6" fill="#111"/>
  <rect x="316" y="406" width="50" height="10" rx="3" fill="#e94560" opacity="0.4"/>
  <rect x="370" y="406" width="50" height="10" rx="3" fill="#0f3460" opacity="0.6"/>
  <rect x="424" y="406" width="50" height="10" rx="3" fill="#e94560" opacity="0.4"/>
  <rect x="316" y="420" width="168" height="10" rx="3" fill="#1a1a2e"/>
  <rect x="316" y="434" width="168" height="8" rx="3" fill="#0f3460" opacity="0.5"/>
  <!-- Mouse -->
  <rect x="500" y="405" width="28" height="38" rx="14" fill="#222"/>
  <rect x="510" y="410" width="8" height="16" rx="4" fill="#e94560" opacity="0.3"/>
  <!-- Neon light strip under desk -->
  <rect x="80" y="388" width="640" height="2" fill="#e94560" opacity="0.3"/>
  <!-- Desk lamp neon -->
  <rect x="180" y="280" width="4" height="80" fill="#e94560" opacity="0.4"/>
  <line x1="170" y1="275" x2="194" y2="275" stroke="#e94560" stroke-width="3" opacity="0.5" stroke-linecap="round"/>
  <!-- Plant silhouette -->
  <circle cx="630" cy="370" r="18" fill="#0a1a0a"/>
  <line x1="630" y1="342" x2="630" y2="370" stroke="#0a1a0a" stroke-width="3"/>
  <!-- Text -->
  <rect x="280" y="470" width="240" height="2" fill="#e94560" opacity="0.3" rx="1"/>
  <text x="400" y="500" text-anchor="middle" fill="#e94560" opacity="0.6" font-family="sans-serif" font-size="12" letter-spacing="3">CYBERPUNK NIGHT SETUP</text>
</svg>
