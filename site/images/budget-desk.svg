<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#faf8f5"/>
      <stop offset="100%" stop-color="#efede8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Simple desk -->
  <rect x="80" y="360" width="640" height="28" rx="3" fill="#e8e4de"/>
  <!-- Small laptop -->
  <rect x="340" y="260" width="120" height="80" rx="6" fill="#ddd" stroke="#ccc" stroke-width="1"/>
  <rect x="345" y="265" width="110" height="50" rx="2" fill="#f5f5f3"/>
  <rect x="350" y="315" width="100" height="25" rx="2" fill="#e0ddd8"/>
  <!-- Simple mouse -->
  <rect x="470" y="390" width="28" height="36" rx="14" fill="#ddd"/>
  <!-- Basic lamp -->
  <rect x="200" y="320" width="5" height="40" fill="#e0ddd8"/>
  <circle cx="202" cy="318" r="12" fill="#eee"/>
  <!-- Notebook -->
  <rect x="270" y="395" width="50" height="35" rx="2" fill="#f0ece5"/>
  <rect x="275" y="400" width="40" height="2" fill="#e0dcd5" rx="1"/>
  <rect x="275" y="406" width="35" height="2" fill="#e0dcd5" rx="1"/>
  <!-- Small plant -->
  <circle cx="600" cy="370" r="15" fill="#8a9b5a"/>
  <line x1="600" y1="345" x2="600" y2="370" stroke="#7a8b4a" stroke-width="3"/>
  <!-- Pencil holder -->
  <rect x="540" y="375" width="14" height="14" rx="2" fill="#c0bbb5"/>
  <line x1="545" y1="372" x2="545" y2="375" stroke="#999" stroke-width="1.5"/>
  <line x1="550" y1="370" x2="550" y2="375" stroke="#999" stroke-width="1.5"/>
  <!-- Text -->
  <rect x="280" y="470" width="240" height="2" fill="#ccc" opacity="0.5" rx="1"/>
  <text x="400" y="495" text-anchor="middle" fill="#bbb" opacity="0.6" font-family="sans-serif" font-size="13">Budget Desk Upgrade · Under $300</text>
</svg>
